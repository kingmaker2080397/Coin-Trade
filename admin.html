<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GMC Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { background: #000; color: #fff; font-family: monospace; }</style>
</head>
<body class="p-6">
    <h1 class="text-green-500 font-bold mb-8 border-b border-gray-800 pb-2">ADMIN COMMAND</h1>
    
    <div class="grid gap-6">
        <div class="bg-zinc-900 p-4 rounded-lg">
            <h2 class="text-xs text-blue-400 mb-2">PAYMENT DETAILS</h2>
            <textarea id="pay-input" class="w-full bg-black border border-gray-800 p-2 text-xs h-20" placeholder="JazzCash: 03xx..."></textarea>
            <button id="save-pay" class="bg-blue-600 w-full p-2 mt-2 rounded text-xs">UPDATE</button>
        </div>

        <div class="bg-zinc-900 p-4 rounded-lg">
            <h2 class="text-xs text-green-400 mb-2">SET BALANCE</h2>
            <input type="text" id="uid-input" placeholder="User UID" class="w-full bg-black border border-gray-800 p-2 text-xs mb-2">
            <input type="number" id="bal-input" placeholder="Amount" class="w-full bg-black border border-gray-800 p-2 text-xs mb-2">
            <button id="save-bal" class="bg-green-600 w-full p-2 rounded text-xs text-black font-bold">UPDATE BALANCE</button>
        </div>

        <div class="bg-zinc-900 p-4 rounded-lg">
            <h2 class="text-xs text-yellow-400 mb-2">KYC REQUESTS</h2>
            <div id="kyc-list" class="space-y-2 text-[10px]"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3H5aQHuX3RTdJgJnSZGYJCRmCI51Mvbg",
            authDomain: "coin-terminal.firebaseapp.com",
            projectId: "coin-terminal",
            storageBucket: "coin-terminal.firebasestorage.app",
            messagingSenderId: "673812925700",
            appId: "1:673812925700:web:680ce7d2706d4474941451"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('save-pay').onclick = async () => {
            const val = document.getElementById('pay-input').value;
            await setDoc(doc(db, "settings", "payment_info"), { text: val });
            alert("Payment Method Updated!");
        };

        document.getElementById('save-bal').onclick = async () => {
            const uid = document.getElementById('uid-input').value;
            const bal = document.getElementById('bal-input').value;
            await setDoc(doc(db, "users", uid), { balance: parseFloat(bal) }, {merge:true});
            alert("Balance Updated!");
        };

        onSnapshot(collection(db, "kyc"), snap => {
            const list = document.getElementById('kyc-list');
            list.innerHTML = "";
            snap.forEach(d => {
                const k = d.data();
                list.innerHTML += `<div class="bg-black p-2 border border-gray-800">
                    User: ${k.email} <br>
                    <a href="${k.url}" target="_blank" class="text-blue-500 underline">VIEW ID</a>
                    <button onclick="approveKYC('${d.id}')" class="ml-4 text-green-500">[APPROVE]</button>
                </div>`;
            });
        });
    </script>
</body>
</html>
