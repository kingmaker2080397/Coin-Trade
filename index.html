<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMC Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon: #00ff88; --dark: #05070a; }
        body { background: var(--dark); color: white; font-family: sans-serif; padding-bottom: 80px; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }
        .page { display: none; padding: 20px; }
        .active-page { display: block; }
        input { background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; color: white; outline: none; }
        .btn-primary { background: var(--neon); color: black; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; border:none; }
    </style>
</head>
<body>

    <nav class="fixed bottom-0 left-0 w-full glass flex justify-around p-4 z-50 text-[10px] font-bold border-t border-gray-800">
        <button onclick="showPage('trade')">📊 TRADE</button>
        <button onclick="showPage('wallet')">💰 WALLET</button>
        <button onclick="showPage('kyc')">🆔 KYC</button>
        <button onclick="showPage('auth')" id="nav-auth-text">👤 LOGIN</button>
    </nav>

    <div id="auth" class="page active-page">
        <div id="login-box" class="glass p-8 mt-10 text-center">
            <h1 class="text-2xl font-black mb-6 text-green-400">GMC LOGIN</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button id="auth-btn" class="btn-primary">ACCESS</button>
        </div>
        <div id="profile-box" class="glass p-8 mt-10 hidden text-center">
            <h2 class="text-xl font-bold text-green-400 mb-2">PROFILE</h2>
            <p id="user-email" class="text-xs text-gray-500 mb-4"></p>
            <p id="user-uid" class="text-[9px] bg-black p-2 rounded text-gray-600 mb-6 font-mono"></p>
            <button id="logout-btn" class="w-full text-red-500 text-xs border border-red-900/30 p-2 rounded">LOGOUT</button>
        </div>
    </div>

    <div id="trade" class="page">
        <div class="flex justify-between mb-4"><h1 class="font-bold text-xl">GMC/USDT</h1><span id="price" class="text-green-400 font-mono text-sm">$1.2854</span></div>
        <div class="glass h-48 mb-4 p-4 flex items-end gap-1">
            <div class="bg-green-500/30 w-full h-1/2"></div>
            <div class="bg-green-500/50 w-full h-3/4"></div>
            <div class="bg-green-500/20 w-full h-1/3"></div>
            <div class="bg-green-500/60 w-full h-full animate-pulse"></div>
        </div>
        <div class="glass p-4">
            <input type="number" id="t-price" placeholder="Limit Price">
            <input type="number" id="t-amt" placeholder="GMC Amount">
            <button id="trade-btn" class="btn-primary mt-2">BUY GMC</button>
        </div>
    </div>

    <div id="wallet" class="page text-center">
        <div class="glass p-10 mb-6">
            <p class="text-[10px] text-gray-500 uppercase">Available Assets</p>
            <h1 class="text-5xl font-black mt-2">$<span id="balance">0.00</span></h1>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <button onclick="document.getElementById('dep-modal').classList.remove('hidden')" class="glass p-6 text-xs font-bold">📥 DEPOSIT</button>
            <button onclick="alert('KYC Needed')" class="glass p-6 text-xs font-bold">📤 WITHDRAW</button>
        </div>
    </div>

    <div id="dep-modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-6">
        <div class="glass p-8 w-full max-w-sm text-center">
            <h2 class="text-green-400 font-bold mb-4">DEPOSIT</h2>
            <div id="pay-info" class="bg-black p-4 text-xs text-left text-green-400 whitespace-pre-line">Admin setting methods...</div>
            <button onclick="document.getElementById('dep-modal').classList.add('hidden')" class="mt-6 text-red-500 text-xs">CLOSE</button>
        </div>
    </div>

    <div id="kyc" class="page">
        <div class="glass p-6">
            <h2 class="text-green-500 font-bold mb-4 tracking-widest">KYC</h2>
            <input type="file" id="kyc-file">
            <button id="kyc-btn" class="btn-primary mt-4">SUBMIT ID</button>
            <p id="kyc-status" class="text-xs mt-4 text-yellow-500"></p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        window.showPage = (id) => {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.getElementById(id).classList.add('active-page');
        };
    </script>
</body>
        </html>
